<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dogaria</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
</head>
<body>
  <header>
    <h1>Dogaria</h1>
    <p>犬のおしっこ記録から、推定高さと位置で縄張りを可視化します。</p>
  </header>

  <main>
    <section class="panel">
      <h2>記録追加</h2>

      <label for="dogName">犬の名前</label>
      <input id="dogName" type="text" placeholder="例: ポチ" />

      <label for="imageInput">画像アップロード</label>
      <input id="imageInput" type="file" accept="image/*" />

      <p class="hint">
        撮影の推奨: 15cm定規を電柱側面に縦向きで密着して撮影してください。<br />
        画像上で次の順に4点をタップ: <strong>地面 → 最高点 → 定規下端 → 定規上端</strong>
      </p>

      <canvas id="canvas" aria-label="計測用キャンバス"></canvas>

      <div class="button-row">
        <button id="autoDetectBtn" type="button">定規自動検出（補助）</button>
        <button id="resetPointsBtn" type="button">点リセット</button>
        <button id="saveBtn" type="button" class="primary">保存</button>
      </div>

      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <section class="panel">
      <h2>地図 / 縄張り</h2>
      <p class="hint">円は各記録の影響範囲、格子色は現在表示範囲での優勢犬（近似）です。</p>
      <div id="map"></div>
      <p class="osm-note">© OpenStreetMap contributors</p>
    </section>

    <section class="panel">
      <h2>記録一覧</h2>
      <div class="button-row">
        <button id="redrawBtn" type="button">再描画</button>
        <button id="clearBtn" type="button" class="danger">全削除</button>
      </div>
      <ul id="logList"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
