<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dogaria</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
</head>
<body>
  <header>
    <h1>Dogaria</h1>
    <p>犬のおしっこ記録から縄張りを可視化する</p>
  </header>

  <main>
    <section class="panel">
      <h2>記録を追加</h2>

      <label>犬の名前</label>
      <input id="dogName" type="text" placeholder="例: ポチ" />

      <label>画像アップロード</label>
      <input id="imageInput" type="file" accept="image/*" />

      <label>マーカーの実寸（cm）</label>
      <input id="markerHeightCm" type="number" value="10" min="1" step="0.1" />

      <p class="hint">
        画像上で順にタップ:
        <br>1. 地面
        <br>2. おしっこ最高点
        <br>3. マーカー下端
        <br>4. マーカー上端
      </p>

      <canvas id="canvas"></canvas>

      <div class="button-row">
        <button id="resetPointsBtn" type="button">点をリセット</button>
        <button id="saveBtn" type="button">保存</button>
      </div>

      <div id="status"></div>
    </section>

    <section class="panel">
      <h2>縄張りマップ</h2>
      <div id="map"></div>
      <p class="osm-note">© OpenStreetMap contributors</p>
    </section>

    <section class="panel">
      <h2>記録一覧</h2>
      <div class="button-row">
        <button id="redrawBtn" type="button">再描画</button>
        <button id="clearBtn" type="button" class="danger">全削除</button>
      </div>
      <ul id="logList"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
